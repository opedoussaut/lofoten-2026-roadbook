<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#153047"><title>Lofoten 2026 — Roadbook vivant</title><style>:root{--n:#153047;--b:#285f7d;--t:#2f7d78;--i:#eef6f7;--l:#d9e2e7;--w:#fff;--x:#202b33;--m:#66737d;--ok:#dff2e1;--wa:#fff1c7}*{box-sizing:border-box}body{margin:0;background:#f4f7f8;color:var(--x);font:15px system-ui,-apple-system,Segoe UI,sans-serif}header{padding:22px 16px;background:linear-gradient(135deg,var(--n),var(--b));color:#fff}h1{margin:0}header p{margin:.4rem 0 0}nav{display:flex;gap:8px;overflow:auto;padding:10px;background:#fff;position:sticky;top:0;border-bottom:1px solid var(--l)}button{border:0;border-radius:9px;padding:9px 12px;background:var(--i);font-weight:700;color:var(--n);cursor:pointer}.primary{background:var(--t);color:#fff}.danger{background:#f8d6d5}.view{display:none}.view.active{display:block}main{max-width:1200px;margin:auto;padding:14px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}.card{background:#fff;border:1px solid var(--l);border-radius:14px;padding:15px;box-shadow:0 3px 12px #15304710}.kpi strong{font-size:1.55rem;color:var(--n)}.small{color:var(--m);font-size:.87rem}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.table{overflow:auto;max-height:68vh;border:1px solid var(--l);border-radius:12px}table{width:100%;border-collapse:collapse;background:#fff}th,td{padding:9px;border-bottom:1px solid var(--l);text-align:left;vertical-align:top}th{background:var(--t);color:#fff;position:sticky;top:0}td[contenteditable]{background:#fffdf5}input,textarea,select{width:100%;padding:9px;border:1px solid #b8c6ce;border-radius:8px;font:inherit}textarea{min-height:80px}.form{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px}.note{background:var(--wa);padding:10px;border-radius:9px}.ok{background:var(--ok)}progress{width:100%}@media(max-width:650px){main{padding:8px}th,td{min-width:120px}}</style></head><body><header><h1>🚐 Lofoten 2026 — Roadbook vivant</h1><p>Olivier, Sorya & Paddy · 25 août → 11 septembre 2026</p></header><nav id="nav"></nav><main><section id="dashboard" class="view active"></section><section id="route" class="view"></section><section id="family" class="view"></section><section id="van" class="view"></section><section id="journal" class="view"></section><section id="backup" class="view"></section></main><input id="file" type="file" accept="application/json" hidden><script>const KEY='lofoten2026-roadbook';const base={meta:{pickup:'24/08/2026 16:00',start:'25/08/2026 tôt',return:'11/09/2026 17:00',from:'Saint-Rémy-lès-Chevreuse',to:'Champlan'},current:{date:'2026-08-25',place:'Saint-Rémy-lès-Chevreuse',olivier:5,sorya:5,paddy:5,weather:'À vérifier',decision:'Suivre le plan initial'},route:[['25/08','Saint-Rémy-lès-Chevreuse','Hambourg',700,7.3,'Exceptionnelle','Transit direct','Arrêt avant Brême'],['26/08','Hambourg','Jönköping',650,7,'Exceptionnelle','Danemark, ponts, Malmö','Stopper Helsingborg'],['27/08','Jönköping','Gävle',520,5.8,'Normale','Contourner Stockholm','Nuit plus au sud'],['28/08','Gävle','Umeå / Skellefteå',590,6.2,'Normale','E4 nord','Stop avant Umeå'],['29/08','Umeå / Skellefteå','Kiruna / Abisko',620,6.5,'Soutenue','Transit Laponie','Stop Gällivare'],['30/08','Kiruna / Abisko','Kabelvåg / Svolvær',410,5.5,'Normale','Narvik puis E10, sans ferry','Nuit Narvik'],['31/08','Kabelvåg','Kabelvåg',60,1.5,'Lofoten','Henningsvær et plages','Villages et cafés'],['01/09','Kabelvåg','Leknes / Ballstad',150,3,'Lofoten','Unstad, Haukland, Uttakleiv','Réduire à deux lieux'],['02/09','Leknes / Ballstad','Reine / Sørvågen',120,3,'Lofoten','Ramberg, Nusfjord, Hamnøy','Villages si pluie'],['03/09','Reine / Sørvågen','Reine / Sørvågen',40,1,'Lofoten','Hamnøy, Reine, Å','Musées et cafés'],['04/09','Reine / Sørvågen','Reine / Sørvågen',50,1,'Lofoten','Journée météo flexible','Repos'],['05/09','Reine / Sørvågen','Fauske',550,6.5,'Soutenue','E10, Narvik, E6','Stop Narvik'],['06/09','Fauske','Mosjøen',390,5.8,'Normale','Saltfjellet','Nuit Mo i Rana'],['07/09','Mosjøen','Trondheim',390,6,'Normale','E6 sud','Stop avant Trondheim'],['08/09','Trondheim','Lillehammer / Vinstra',360,5.8,'Normale','Dovrefjell','Nuit Vinstra'],['09/09','Lillehammer','Göteborg sud',460,5.8,'Normale','Oslo puis transit','Stop avant Göteborg'],['10/09','Göteborg','Hanovre / Münster',750,7.5,'Exceptionnelle','Danemark, Allemagne','Stop Hambourg'],['11/09','Hanovre / Münster','Champlan',650,6.3,'Soutenue','Plein, nettoyage, restitution 17 h','Départ très tôt']],family:[['Henningsvær et port','Est','Famille A','2–3 h','Plat, aucune exposition','Oui'],['Rørvikstranda','Est','Famille A','1 h','Plage facile','Oui'],['Haukland Beach','Centre','Famille A','1–2 h','Plage et marche libre','Oui'],['Haukland → Uttakleiv, ancienne route','Centre','Famille B','2–3 h','Progressif, sans crête','Selon énergie'],['Unstad','Centre','Famille A','1–2 h','Plage et village','Oui'],['Nusfjord','Sud','Famille A','2–3 h','Village, marches courtes','Oui'],['Hamnøy, Sakrisøy, Reine','Sud','Famille A','3–4 h','Points de vue accessibles','Oui'],['Sørvågen et Å','Sud','Famille A','3–5 h','Villages et sentiers courts','Oui']],olivier:[['Reinebringen','Raide et escaliers; non familial'],['Ryten / Kvalvika','Longue sortie; terrain humide possible'],['Festvågtind','Raide et potentiellement exposé'],['Mannen','Crête; option uniquement']],van:{fuel:100,water:100,grey:0,battery:100,toilet:'OK',next:'Contrôle complet avant départ'},journal:[],track:{km:0,points:[]}};let s=load();function load(){try{return JSON.parse(localStorage.getItem(KEY))||structuredClone(base)}catch(e){return structuredClone(base)}}function save(){localStorage.setItem(KEY,JSON.stringify(s))}const tabs=[['dashboard','Tableau de bord'],['route','Itinéraire'],['family','Lofoten famille'],['van','Van'],['journal','Journal'],['backup','Sauvegarde']];tabs.forEach(([id,l])=>{let b=document.createElement('button');b.textContent=l;b.onclick=()=>show(id);nav.appendChild(b)});function show(id){document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active');({dashboard:dash,route:route,family:family,van:van,journal:journal,backup:backup}[id])()}function km(){return s.route.reduce((a,r)=>a+(+r[3]||0),0)}function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function dash(){dashboard.innerHTML=`<div class="grid"><div class="card kpi"><span class="small">Prise du van</span><br><strong>${s.meta.pickup}</strong></div><div class="card kpi"><span class="small">Départ réel</span><br><strong>${s.meta.start}</strong><br>${s.meta.from}</div><div class="card kpi"><span class="small">Restitution</span><br><strong>${s.meta.return}</strong><br>${s.meta.to}</div><div class="card kpi"><span class="small">Distance prévue</span><br><strong>${km().toLocaleString('fr-FR')} km</strong></div><div class="card kpi"><span class="small">GPS enregistré</span><br><strong>${s.track.km.toFixed(1)} km</strong></div></div><div class="grid" style="margin-top:12px"><div class="card"><h2>État actuel</h2><div class="form"><input type="date" value="${s.current.date}" onchange="s.current.date=this.value;save()"><input value="${esc(s.current.place)}" onchange="s.current.place=this.value;save()"><input type="number" min="1" max="5" value="${s.current.olivier}" onchange="s.current.olivier=+this.value;save()"><input type="number" min="1" max="5" value="${s.current.sorya}" onchange="s.current.sorya=+this.value;save()"><input type="number" min="1" max="5" value="${s.current.paddy}" onchange="s.current.paddy=+this.value;save()"><input value="${esc(s.current.weather)}" onchange="s.current.weather=this.value;save()"></div><textarea onchange="s.current.decision=this.value;save()">${esc(s.current.decision)}</textarea></div><div class="card"><h2>Suivi GPS</h2><p class="small">Fonctionne lorsque la page reste ouverte et que le GPS est autorisé. Ce n’est pas un suivi arrière-plan garanti.</p><div class="toolbar"><button class="primary" onclick="startGPS()">Démarrer</button><button onclick="stopGPS()">Arrêter</button><button class="danger" onclick="if(confirm('Effacer le trajet GPS ?')){s.track={km:0,points:[]};save();dash()}">Réinitialiser</button></div><div id="gps" class="note">Suivi inactif</div></div></div><div class="card" style="margin-top:12px"><b>Règle principale :</b> le voyage est conçu d’abord pour Sorya et Paddy. Aucune randonnée familiale ne doit comporter de crête aérienne, de passage exposé ou de pente extrême.</div>`}function route(){let rows=s.route.map((r,i)=>`<tr>${r.map((v,j)=>`<td contenteditable onblur="s.route[${i}][${j}]=${j===3||j===4?'+this.innerText.replace(\',\',\'.\')':'this.innerText'};save()">${esc(v)}</td>`).join('')}<td><button class="danger" onclick="s.route.splice(${i},1);save();route()">×</button></td></tr>`).join('');route.innerHTML=`<div class="card"><h2>Itinéraire modifiable</h2><div class="toolbar"><button class="primary" onclick="s.route.push(['Date','Départ','Arrivée',0,0,'Normale','Plan A','Plan B']);save();route()">Ajouter</button></div><div class="table"><table><thead><tr><th>Date</th><th>Départ</th><th>Arrivée</th><th>Km</th><th>Heures</th><th>Type</th><th>Plan A</th><th>Plan B</th><th></th></tr></thead><tbody>${rows}</tbody></table></div></div>`}function family(){let rows=s.family.map((r,i)=>`<tr>${r.map((v,j)=>`<td contenteditable onblur="s.family[${i}][${j}]=this.innerText;save()">${esc(v)}</td>`).join('')}</tr>`).join('');family.innerHTML=`<div class="card"><h2>Programme familial</h2><div class="table"><table><thead><tr><th>Activité</th><th>Secteur</th><th>Catégorie</th><th>Durée</th><th>Terrain</th><th>Paddy</th></tr></thead><tbody>${rows}</tbody></table></div></div><h2>Options Olivier, séparées du programme commun</h2><div class="grid">${s.olivier.map(x=>`<div class="card"><h3>${esc(x[0])}</h3><p>${esc(x[1])}</p></div>`).join('')}</div>`}function meter(n,k){return `<div class="card"><h3>${n}</h3><progress max="100" value="${s.van[k]}"></progress><input type="number" min="0" max="100" value="${s.van[k]}" onchange="s.van.${k}=+this.value;save();van()"></div>`}function van(){van.innerHTML=`<div class="grid">${meter('Carburant','fuel')}${meter('Eau propre','water')}${meter('Eaux grises','grey')}${meter('Batterie','battery')}</div><div class="card" style="margin-top:12px"><div class="form"><select onchange="s.van.toilet=this.value;save()"><option>OK</option><option>À vider</option><option>À traiter</option></select><input value="${esc(s.van.next)}" onchange="s.van.next=this.value;save()"></div></div>`}function journal(){journal.innerHTML=`<div class="card"><h2>Journal de bord</h2><div class="form"><input id="jd" type="date" value="${s.current.date}"><input id="jp" placeholder="Lieu"><input id="jk" type="number" placeholder="Km"><input id="jm" placeholder="Météo"></div><textarea id="jh" placeholder="Moment fort"></textarea><textarea id="ja" placeholder="Aléa / décision"></textarea><button class="primary" onclick="s.journal.unshift({d:jd.value,p:jp.value,k:jk.value,m:jm.value,h:jh.value,a:ja.value});save();journal()">Ajouter</button></div><div class="card"><div class="table"><table><thead><tr><th>Date</th><th>Lieu</th><th>Km</th><th>Météo</th><th>Moment fort</th><th>Aléa</th></tr></thead><tbody>${s.journal.map(x=>`<tr><td>${esc(x.d)}</td><td>${esc(x.p)}</td><td>${esc(x.k)}</td><td>${esc(x.m)}</td><td>${esc(x.h)}</td><td>${esc(x.a)}</td></tr>`).join('')}</tbody></table></div></div>`}function backup(){backup.innerHTML=`<div class="card"><h2>Sauvegarde</h2><p>Les modifications sont enregistrées localement dans ce navigateur. Exportez régulièrement le fichier JSON.</p><div class="toolbar"><button class="primary" onclick="exp()">Exporter JSON</button><button onclick="file.click()">Importer JSON</button><button class="danger" onclick="if(confirm('Effacer toutes les modifications ?')){s=structuredClone(base);save();dash()}">Réinitialiser</button></div></div>`}function exp(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(s,null,2)],{type:'application/json'}));a.download='lofoten-2026-roadbook.json';a.click()}file.onchange=e=>{let r=new FileReader();r.onload=()=>{try{s=JSON.parse(r.result);save();dash()}catch(e){alert('JSON invalide')}};r.readAsText(e.target.files[0])};let w=null;function startGPS(){if(!navigator.geolocation)return alert('GPS indisponible');gps.textContent='Suivi actif — gardez la page ouverte';gps.classList.add('ok');w=navigator.geolocation.watchPosition(p=>{let q={a:p.coords.latitude,o:p.coords.longitude,t:Date.now()},z=s.track.points.at(-1);if(z){let d=hav(z.a,z.o,q.a,q.o);if(d>.01&&d<5)s.track.km+=d}s.track.points.push(q);save();dash()})}function stopGPS(){if(w!==null)navigator.geolocation.clearWatch(w);w=null;dash()}function hav(a,b,c,d){let R=6371,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180,z=Math.sin(x/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;return 2*R*Math.asin(Math.sqrt(z))}dash();</script></body></html>
